<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TTOTube - YouTube Premium 최저가</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='14' font-weight='900'>TT</text></svg>"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f23;--card:#1a1a2e;--pri:#6366f1;--pri2:#818cf8;--pur:#8b5cf6;--lav:#a78bfa;--txt:#e2e8f0;--mut:#94a3b8;--dim:#64748b;--ddim:#475569;--red:#ef4444;--grn:#4ade80;--yel:#fbbf24;--bdr:rgba(255,255,255,.06);--bdrp:rgba(99,102,241,.25)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all .3s}
#hdr.sc{background:rgba(15,15,35,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
.hi{max-width:1200px;margin:0 auto;padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}.logo i{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--pri),var(--pur));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;font-style:normal}.logo b{font-size:18px}
.nav{display:flex;align-items:center;gap:20px}.nl{display:flex;gap:20px}.nb{display:flex;gap:8px;align-items:center}
.nk{color:var(--mut);font-size:14px;background:none;border:none;transition:color .2s}.nk:hover,.nk.on{color:#fff}.nk.on{color:var(--pri2);font-weight:600}
.bl{background:0;border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 14px;border-radius:8px;font-size:13px}.bl:hover{border-color:var(--pri)}
.bs{background:linear-gradient(135deg,var(--pri),var(--pur));border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600}
.ci{position:relative;font-size:18px;padding:4px;cursor:pointer;background:none;border:none;color:#fff}.cb{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;border-radius:10px;padding:1px 5px;font-size:9px}
.hb{display:none;background:none;border:none;color:#fff;font-size:24px}
/* User menu */
.um{display:flex;align-items:center;gap:10px}.ua{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--pur));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;position:relative}
.ud{position:absolute;top:44px;right:0;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.25);min-width:200px;z-index:2000;display:none;animation:fiu .2s ease}.ud.op{display:block}
.udh{padding:16px;border-bottom:1px solid #eee;background:#f9f9fb}.udn{font-size:14px;font-weight:700;color:#111}.ude{font-size:12px;color:#888;margin-top:2px}
.udi{padding:12px 16px;font-size:13px;color:#333;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .15s}.udi:hover{background:#f3f4f6}.udi.lo{color:var(--red);border-top:1px solid #eee}

/* Mobile menu */
#mm{display:none;position:fixed;inset:0;z-index:9998;background:rgba(15,15,35,.98);flex-direction:column;align-items:center;justify-content:center;gap:28px}#mm.op{display:flex}#mm .nk{font-size:20px;color:#fff}

/* AUTH MODALS */
.ao{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}.ao.op{display:flex}
.ab{background:#fff;border-radius:16px;padding:36px 32px 28px;max-width:420px;width:92%;position:relative;animation:fiu .3s ease;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.ax{position:absolute;top:14px;right:18px;background:none;border:none;color:#999;font-size:22px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}.ax:hover{color:#333;background:#f3f4f6}
.at{font-size:22px;font-weight:800;color:#111;text-align:center;margin-bottom:24px}
.ai{width:100%;padding:14px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#111;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:10px}.ai:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(99,102,241,.1)}.ai::placeholder{color:#aaa}
.acr{display:flex;align-items:center;gap:8px;margin:6px 0 18px}
.ack{-webkit-appearance:none;appearance:none;width:20px;height:20px;border:2px solid #ddd;border-radius:4px;cursor:pointer;position:relative;flex-shrink:0;transition:all .15s}.ack:checked{background:var(--red);border-color:var(--red)}.ack:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:12px;font-weight:700}
.asm{width:100%;padding:14px;border-radius:8px;border:none;background:var(--red);color:#fff;font-weight:700;font-size:15px;margin-bottom:14px}.asm:hover{background:#dc2626}
.alk{display:flex;justify-content:center;gap:16px;margin-bottom:18px}.alk button{font-size:13px;color:#666;background:none;border:none;padding:0}.alk button:hover{color:#111}
.adv{display:flex;align-items:center;gap:12px;margin:18px 0}.adv::before,.adv::after{content:'';flex:1;height:1px;background:#e5e7eb}.adv span{font-size:13px;color:#aaa}
.agb{width:100%;padding:13px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#333;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px}.agb:hover{background:#f9fafb}
.aig{position:relative;margin-bottom:10px}.aig .ai{margin-bottom:0}.apt{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#bbb;font-size:16px;padding:4px}.apt:hover{color:#666}

/* Toast */
.tst{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:10000;background:#111;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.3);opacity:0;transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:8px;white-space:nowrap}.tst.sh{opacity:1;transform:translateX(-50%) translateY(0)}.tst.ok{background:#059669}.tst.er{background:var(--red)}

/* HERO */
.hero{position:relative;overflow:hidden;padding:80px 20px 60px;text-align:center}.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.15) 0%,transparent 60%)}.hc{position:relative;z-index:1;max-width:700px;margin:0 auto}
.hs{color:var(--pri2);font-size:13px;font-weight:600;letter-spacing:2px;margin-bottom:12px}
.hero h1{font-size:clamp(28px,5vw,44px);font-weight:900;line-height:1.2;margin-bottom:20px;background:linear-gradient(135deg,#fff 40%,var(--pri2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--mut);font-size:15px;line-height:1.7;margin-bottom:32px}.hero p b{color:var(--txt)}
.htg{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:32px}.ht{background:rgba(99,102,241,.12);border:1px solid var(--bdrp);padding:6px 16px;border-radius:20px;font-size:13px;color:var(--lav)}
.hpb{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:16px;padding:20px;display:inline-block}.hpb .dc{color:var(--red);font-size:13px;font-weight:700}.hpb .og{color:var(--ddim);font-size:14px;text-decoration:line-through}.hpb .pr{color:#fff;font-size:32px;font-weight:900}.hpb .pr span{font-size:14px;font-weight:400;color:var(--mut)}

/* CATEGORIES */
.cats{max-width:1200px;margin:0 auto;padding:0 20px 20px;display:flex;gap:8px;overflow-x:auto}.cats::-webkit-scrollbar{display:none}
.cb2{white-space:nowrap;padding:8px 18px;border-radius:10px;border:1px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--mut);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .2s}.cb2.on{border-color:var(--pri);background:rgba(99,102,241,.15);color:var(--pri2)}

/* PRODUCT GRID */
.pg{max-width:1200px;margin:0 auto;padding:0 20px 40px}.pgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.pc{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--bdr);display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative}.pc:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(99,102,241,.15)}
.pcb{position:absolute;top:12px;left:12px;display:flex;gap:6px;z-index:2}.bdg{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;color:#fff}.bdg-s{background:var(--red)}.bdg-b{background:var(--pri)}.bdg-o{background:#666}.bdg-sp{background:#f59e0b}
.pch{padding:28px 20px 16px;display:flex;align-items:center;gap:12px}.pch img{width:40px;height:40px;border-radius:10px;object-fit:cover;background:#fff}
.pcn{color:#fff;font-size:16px;font-weight:700;margin-top:2px}.pcbr{color:var(--mut);font-size:12px}.pcd{padding:0 20px;color:var(--dim);font-size:13px}
.pcdv{margin:12px 20px;height:1px;background:var(--bdr)}.pcpr{padding:0 20px}.pcp{color:#fff;font-size:24px;font-weight:800}.pcpe{color:var(--pri);font-size:13px;font-weight:600;margin-left:8px}.pcpm{color:var(--lav);font-size:12px;margin-top:2px}
.pcog{color:var(--ddim);font-size:13px;text-decoration:line-through;margin-right:6px}.pcdc{color:var(--red);font-size:13px;font-weight:700}
.pcf{padding:12px 20px 0}.pcfi{color:var(--mut);font-size:12px;padding:3px 0;display:flex;align-items:center;gap:6px}.pcfi::before{content:'•';color:var(--pri)}
.pcs{padding:8px 20px;color:var(--ddim);font-size:12px}.pcs b{color:#fff}
.pca{padding:0 20px 20px;margin-top:auto}
.bbuy{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--pri),var(--pur));color:#fff;font-weight:700;font-size:14px;transition:opacity .2s}.bbuy:hover{opacity:.9}.bbuy.so{background:#333;cursor:not-allowed;opacity:.5}
.sol{text-align:center;color:var(--red);font-size:11px;margin-top:6px}
.va{text-align:center;margin-top:24px}.va button{background:0;border:1px solid rgba(255,255,255,.1);color:var(--mut);padding:10px 28px;border-radius:10px;font-size:13px}.va button:hover{border-color:var(--pri);color:#fff}

/* LIVE BANNER */
.lb{max-width:900px;margin:0 auto;padding:0 20px 40px}.lbi{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:16px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border:1px solid rgba(99,102,241,.3)}
.ld{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;display:inline-block;margin-right:8px}
.lbn{background:#fff;color:#1e1b4b;border:none;padding:10px 24px;border-radius:10px;font-weight:700;font-size:13px;white-space:nowrap}

/* WHY */
.why{max-width:900px;margin:0 auto;padding:0 20px 60px;text-align:center}.why h2{font-size:28px;font-weight:800;margin-bottom:40px}
.wg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}.wc{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--bdr)}.wi{font-size:36px;margin-bottom:12px}.wt{font-weight:700;font-size:16px;margin-bottom:4px}.wd{color:var(--mut);font-size:13px}
.wn{margin-top:32px;padding:24px 20px;background:rgba(99,102,241,.05);border-radius:16px;border:1px solid rgba(99,102,241,.1)}.wn p{color:var(--txt);font-size:15px;line-height:1.7}.wn small{color:var(--pri2);font-size:12px;display:block;margin-top:12px}

/* CHAT */
.cs{max-width:900px;margin:0 auto;padding:0 20px 60px}.csh{text-align:center;margin-bottom:32px}.csh h2{font-size:28px;font-weight:800;margin-bottom:8px}.csh p{color:var(--mut);font-size:14px}
.cbx{max-width:400px;margin:0 auto;background:var(--card);border-radius:20px;overflow:hidden;border:1px solid var(--bdr)}.cbt{background:var(--pri);padding:12px 16px;display:flex;align-items:center;gap:10px}.cba{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;color:var(--pri)}.cbd{padding:16px;max-height:380px;overflow-y:auto}
.cm{display:flex;margin-bottom:12px}.cm.u{justify-content:flex-end}.cm.b{justify-content:flex-start}.cmb{max-width:80%;padding:10px 14px;font-size:13px;line-height:1.6;color:#fff}.cm.u .cmb{background:var(--pri);border-radius:16px 16px 4px 16px}.cm.b .cmb{background:#252547;border-radius:16px 16px 16px 4px}.cmt{color:rgba(255,255,255,.4);font-size:10px;margin-top:4px;text-align:right}
.csm{max-width:500px;margin:24px auto 0;text-align:center}.csm p{color:var(--txt);font-size:14px;line-height:1.8}.csm .hl{color:var(--lav);font-size:14px;margin-top:12px;font-weight:600}

/* REVIEWS CAROUSEL */
.rvs{padding:0 0 60px;overflow:hidden}.rvsh{text-align:center;margin-bottom:32px;padding:0 20px}.rvsh h2{font-size:24px;font-weight:800;margin-bottom:8px}.rvsh p{color:var(--mut);font-size:14px}
.rvt{display:flex;gap:16px;animation:scr 80s linear infinite;width:max-content}.rvt:hover{animation-play-state:paused}
.rvc{min-width:280px;max-width:280px;background:var(--card);border-radius:16px;padding:20px;border:1px solid var(--bdr);flex-shrink:0}.rvst{color:var(--yel);font-size:12px;margin-bottom:8px}.rvtt{color:#fff;font-size:15px;font-weight:700;margin-bottom:8px}.rvtx{color:var(--mut);font-size:12px;white-space:pre-line;line-height:1.6;min-height:60px}.rvu{color:var(--pri);font-size:11px;margin-top:12px}
.rcta{text-align:center;margin-top:32px}
.bcta{background:linear-gradient(135deg,var(--pri),var(--pur));border:none;color:#fff;padding:14px 40px;border-radius:12px;font-size:15px;font-weight:700}

/* FOOTER */
footer{border-top:1px solid var(--bdr);padding:32px 20px;text-align:center}.fl{display:flex;justify-content:center;gap:16px;margin-bottom:16px}.fl span{color:var(--dim);font-size:12px;cursor:pointer}.fi{color:var(--ddim);font-size:11px;line-height:1.8}

/* KAKAO FLOAT */
.kf{position:fixed;bottom:24px;right:24px;z-index:900;width:56px;height:56px;border-radius:50%;background:#fee500;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:flt 3s ease-in-out infinite;font-size:28px;border:none}

/* PROMO */
.pp{position:fixed;bottom:24px;left:24px;z-index:950;max-width:320px;animation:su .4s ease}.ppi{background:#1e1b4b;border-radius:16px;padding:16px;border:1px solid rgba(99,102,241,.3);box-shadow:0 8px 32px rgba(0,0,0,.4)}

/* PURCHASE TOAST */
.pt{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(80px);z-index:950;background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);opacity:0;transition:all .4s;pointer-events:none;white-space:nowrap}.pt.sh{opacity:1;transform:translateX(-50%) translateY(0)}

/* PAGE */
.page{max-width:900px;margin:0 auto;padding:40px 20px}.page h2{font-size:28px;font-weight:800;margin-bottom:8px}.page .sub{color:var(--mut);margin-bottom:32px}

/* FAQ / NOTICE items */
.fi2{background:var(--card);border-radius:12px;margin-bottom:12px;border:1px solid var(--bdr);overflow:hidden}
.fq{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}.fq span{color:var(--txt);font-size:14px;font-weight:600}
.fa2{color:var(--pri);font-size:18px;transition:transform .3s}.fa2.op{transform:rotate(180deg)}
.fan{padding:0 20px 16px;color:var(--mut);font-size:14px;line-height:1.7;display:none}.fan.op{display:block}

/* ===== PRODUCT DETAIL ===== */
.pdw{max-width:1000px;margin:0 auto;padding:30px 20px}
.pdbc{font-size:12px;color:var(--dim);margin-bottom:20px}.pdbc span{cursor:pointer}.pdbc span:hover{color:#fff}
.pdt{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:40px}
.pdi{border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--bdr);aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative}.pdi img{max-width:70%;max-height:70%;object-fit:contain}.pdib{position:absolute;top:16px;left:16px;background:var(--red);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:6px}
.pdif h1{font-size:24px;font-weight:800;line-height:1.3;margin-bottom:16px}
.pdpr{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}.pdp{font-size:32px;font-weight:900}.pdop{font-size:16px;color:var(--ddim);text-decoration:line-through}

/* Option Select (고튜브 스타일) */
.opt-section{margin-bottom:20px}.opt-label{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--txt);display:flex;align-items:center;gap:6px}.opt-label .req{color:var(--red);font-size:12px}
.opt-grid{display:flex;flex-direction:column;gap:8px}
.opt-btn{padding:14px 16px;border-radius:12px;border:2px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--txt);font-size:14px;text-align:left;transition:all .2s;display:flex;justify-content:space-between;align-items:center;position:relative}
.opt-btn:hover{border-color:rgba(99,102,241,.4)}.opt-btn.sel{border-color:var(--pri);background:rgba(99,102,241,.1)}
.opt-btn .opt-name{font-weight:600}.opt-btn .opt-price{color:var(--pri2);font-weight:700;font-size:15px}
.opt-btn .opt-check{width:20px;height:20px;border-radius:50%;border:2px solid #555;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-right:10px}
.opt-btn.sel .opt-check{background:var(--pri);border-color:var(--pri)}.opt-btn.sel .opt-check::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.opt-warn{color:var(--red);font-size:12px;margin-top:6px;display:none;animation:shake .4s ease}

/* Checklist */
.ckl{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15);border-radius:14px;padding:20px;margin-bottom:20px}
.cklt{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--txt)}
.ckli{margin-bottom:16px}.ckli h4{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}.ckli p{font-size:12px;color:var(--mut);line-height:1.6}

/* Qty */
.qty{display:flex;align-items:center;gap:12px;margin-bottom:20px}.qty label{font-size:14px;color:var(--mut)}.qc{display:flex;align-items:center;border:1px solid #333;border-radius:8px;overflow:hidden}.qc button{width:36px;height:36px;background:var(--card);border:none;color:#fff;font-size:18px}.qc button:hover{background:#252547}.qc span{width:40px;text-align:center;font-size:14px;font-weight:600;background:var(--bg)}
.pdtl{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-top:1px solid var(--bdr);margin-bottom:20px}
.pdbt{display:flex;gap:10px}.pdb1{flex:2;padding:16px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--pri),var(--pur));color:#fff;font-weight:700;font-size:16px;transition:opacity .2s}.pdb1:hover{opacity:.9}.pdb2{flex:1;padding:16px;border-radius:12px;border:1px solid var(--pri);background:0;color:var(--pri2);font-weight:700;font-size:14px}

/* Tabs */
.pdtb{display:flex;border-bottom:2px solid var(--bdr);margin-bottom:24px}.pdta{padding:14px 24px;font-size:14px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}.pdta.on{color:var(--pri2);border-bottom-color:var(--pri)}

/* 상세정보 펼쳐보기 */
.det-wrap{position:relative;overflow:hidden;transition:max-height .5s ease}.det-wrap.collapsed{max-height:300px}.det-wrap.expanded{max-height:none}
.det-fade{position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(transparent,var(--bg));pointer-events:none;transition:opacity .3s}.det-wrap.expanded .det-fade{opacity:0}
.det-toggle{width:100%;padding:14px;border-radius:12px;border:1px solid var(--bdr);background:var(--card);color:var(--pri2);font-weight:700;font-size:14px;margin:16px 0 24px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}.det-toggle:hover{border-color:var(--pri);background:rgba(99,102,241,.1)}

// ===== DAILY REVIEWS GENERATOR =====
function seedRand(seed){let s=seed;return()=>{s=(s*16807+0)%2147483647;return(s-1)/2147483646}}
function getDailyReviews(pid){
  const today=new Date();const ds=today.getFullYear()*10000+today.getMonth()*100+today.getDate();
  const rng=seedRand(ds*1000+pid);
  const count=15+Math.floor(rng()*10);
  const revs=[];
  for(let i=0;i<count;i++){
    const ni=Math.floor(rng()*RN.length);
    const ti=Math.floor(rng()*RT.length);
    const xi=(ti+Math.floor(rng()*RX.length))%RX.length;
    const tgi=Math.floor(rng()*RTG.length);
    const d=new Date(today);d.setDate(d.getDate()-Math.floor(rng()*30));
    const star=4+Math.floor(rng()*2);
    revs.push({title:RT[ti],text:RX[xi],user:RN[ni]+"님",tag:RTG[tgi],date:`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`,stars:star});
  }
  return revs;
}
function getAllReviews(){
  let all=[];
  P.forEach(p=>{if(!p.soldout)all=all.concat(getDailyReviews(p.id))});
  return all.concat(userReviews).sort(()=>Math.random()-.5);
}

function buyHTML(){return `<div class="page" style="max-width:1100px"><h2>구매하기</h2><p class="sub">원하는 상품을 선택하세요</p><div class="pgr">${P.map(pcHTML).join('')}</div></div>`}
function reviewHTML(){
  const all=getAllReviews();const avg=(all.reduce((s,r)=>s+(r.stars||5),0)/all.length).toFixed(1);
  return `<div class="page"><h2>전체 리뷰</h2><p class="sub">평점 ${avg}점 · 총 ${all.length}개 리뷰</p>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px;text-align:center">
<div style="background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--bdr)"><div style="font-size:32px;font-weight:900;color:var(--yel)">${avg}</div><div style="color:var(--yel);font-size:14px;margin:4px 0">★★★★★</div><div style="color:var(--mut);font-size:12px">평균 평점</div></div>
<div style="background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--bdr)"><div style="font-size:32px;font-weight:900;color:var(--pri2)">${all.length}</div><div style="color:var(--mut);font-size:12px;margin-top:8px">누적 리뷰</div></div>
<div style="background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--bdr)"><div style="font-size:32px;font-weight:900;color:var(--grn)">98%</div><div style="color:var(--mut);font-size:12px;margin-top:8px">재구매율</div></div>
</div>
${all.slice(0,40).map(r=>`<div style="background:var(--card);border-radius:16px;padding:24px;border:1px solid var(--bdr);margin-bottom:16px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--yel)">${'★'.repeat(r.stars||5)}</span><span style="font-size:11px;color:var(--dim)">${r.date||''}</span></div><div style="font-size:16px;font-weight:700;margin-bottom:8px">${r.title}</div><div style="color:var(--mut);font-size:14px;white-space:pre-line;line-height:1.6">${r.text}</div><div style="color:var(--pri);font-size:12px;margin-top:12px">${r.user} (${r.tag})</div></div>`).join('')}
</div>`}

function noticeHTML(){return `<div class="page"><h2>공지사항</h2><div style="margin-bottom:32px"></div>${NOTICES.map((n,i)=>`<div class="fi2"><div class="fq" onclick="tN(${i})"><span style="color:var(--txt);font-size:14px">${n.title}</span><div style="display:flex;align-items:center"><span style="color:var(--dim);font-size:12px;margin-right:12px">${n.date}</span><span class="fa2" id="nA${i}">▾</span></div></div><div class="fan" id="nB${i}">${E(n.body)}</div></div>`).join('')}</div>`}
function faqHTML(){return `<div class="page"><h2>자주 묻는 질문</h2><div style="margin-bottom:32px"></div>${FAQS.map((f,i)=>`<div class="fi2"><div class="fq" onclick="tF(${i})"><span>Q. ${f.q}</span><span class="fa2" id="fA${i}">▾</span></div><div class="fan" id="fB${i}">A. ${f.a}</div></div>`).join('')}</div>`}
function serviceHTML(){return `<div class="page"><h2>서비스 안내</h2><p class="sub">TTOTube의 프리미엄 구독 대행</p>${[{i:"🛡️",t:"비밀번호 공유 없는 안전한 방식",d:"공식 활성화 링크로 계정에 직접 적용됩니다."},{i:"⚡",t:"당일 순차 발송",d:"결제 확인 후 빠르게 처리합니다."},{i:"💰",t:"압도적 가성비",d:"공식 대비 최대 70% 이상 할인."},{i:"🔧",t:"철저한 A/S",d:"카카오톡 상담으로 빠르게 해결."}].map(s=>`<div style="background:var(--card);border-radius:16px;padding:24px;border:1px solid var(--bdr);margin-bottom:16px"><div style="font-size:28px;margin-bottom:12px">${s.i}</div><div style="font-size:18px;font-weight:700;margin-bottom:8px">${s.t}</div><div style="color:var(--mut);font-size:14px;line-height:1.7">${s.d}</div></div>`).join('')}</div>`}
function mypageHTML(){if(!user)return '';return `<div class="page"><div class="mph"><div class="mpa">${user.name[0]}</div><div><h3 style="font-size:20px;font-weight:800;margin-bottom:4px">${user.name}님</h3><p style="color:var(--mut);font-size:13px">${user.id}${user.phone?' · '+user.phone:''}</p></div></div><div class="mpc" onclick="nav('orders')"><h4>📦 주문 내역</h4><p>구매한 상품과 상태 확인</p></div><div class="mpc" onclick="nav('cart')"><h4>🛒 장바구니</h4><p>담아둔 상품 확인</p></div><div class="mpc" onclick="logout()" style="border-color:rgba(239,68,68,.2)"><h4 style="color:var(--red)">🚪 로그아웃</h4><p>현재 계정에서 로그아웃</p></div></div>`}

function tN(i){const b=$('nB'+i),a=$('nA'+i),o=b.classList.contains('op');document.querySelectorAll('.fan').forEach(e=>e.classList.remove('op'));document.querySelectorAll('.fa2').forEach(e=>e.classList.remove('op'));if(!o){b.classList.add('op');a.classList.add('op')}}
function tF(i){const b=$('fB'+i),a=$('fA'+i),o=b.classList.contains('op');document.querySelectorAll('.fan').forEach(e=>e.classList.remove('op'));document.querySelectorAll('.fa2').forEach(e=>e.classList.remove('op'));if(!o){b.classList.add('op');a.classList.add('op')}}

// ===== RENDER =====
function render(){
  const m=$('mc');
  if(pg.startsWith('pd_')){m.innerHTML=pdHTML(parseInt(pg.split('_')[1]));return}
  switch(pg){
    case 'buy':m.innerHTML=buyHTML();break;
    case 'review':m.innerHTML=reviewHTML();break;
    case 'notice':m.innerHTML=noticeHTML();break;
    case 'faq':m.innerHTML=faqHTML();break;
    case 'service':m.innerHTML=serviceHTML();break;
    case 'cart':m.innerHTML=cartHTML();break;
    case 'order':m.innerHTML=orderHTML();break;
    case 'mypage':m.innerHTML=mypageHTML();break;
    case 'orders':m.innerHTML=`<div class="page"><h2>주문 내역</h2><div class="cart-empty"><div class="ic">📭</div><p>주문 내역이 없습니다.</p><br><button class="bcta" onclick="nav('buy')" style="font-size:14px;padding:12px 28px">쇼핑하러 가기</button></div></div>`;break;
    default:m.innerHTML=homeHTML()
  }
}

// ===== INTERVALS =====
setInterval(()=>{liveN+=Math.floor(Math.random()*3)-1;if(liveN<20)liveN=20;const e=$('lN');if(e)e.textContent=liveN},5000);
const TN=["윤O호님","김O수님","이O진님","박O영님","최O현님","강O우님"];
const TP=["유튜브 프리미엄 12개월","유튜브 프리미엄 3개월","ChatGPT Plus","제미나이 프로","캔바 프로"];
function showPT(){const t=$('pt');$('ptT').textContent=TN[Math.floor(Math.random()*TN.length)]+'이 '+TP[Math.floor(Math.random()*TP.length)]+' 구매';t.classList.add('sh');setTimeout(()=>t.classList.remove('sh'),3500)}
setInterval(showPT,8000+Math.random()*5000);setTimeout(showPT,4000);

window.addEventListener('scroll',()=>$('hdr').classList.toggle('sc',window.scrollY>60));
setTimeout(()=>$('promo').style.display='block',3000);
document.addEventListener('click',e=>{if(!e.target.closest('.ua'))$('uD').classList.remove('op');document.querySelectorAll('.ao').forEach(m=>{if(e.target===m)m.classList.remove('op')});if(e.target===$('cartAddM'))closeCAM()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.querySelectorAll('.ao.op').forEach(m=>m.classList.remove('op'));closeCAM()}});

updAuth();render();
</script>
