<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>고튜브 - YouTube Premium 최저가</title>
<meta name="description" content="유튜브 프리미엄 최저가 구독 대행 서비스"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236366f1'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='900'>G</text></svg>"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f23;--card:#1a1a2e;--primary:#6366f1;--primary-light:#818cf8;--purple:#8b5cf6;--lavender:#a78bfa;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;--dark-dim:#475569;--red:#ef4444;--green:#4ade80;--yellow:#fbbf24;--border:rgba(255,255,255,0.06);--border-primary:rgba(99,102,241,0.25)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans KR',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:inherit}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:1000;transition:all .3s}
#header.scrolled{background:rgba(15,15,35,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff}
.logo-text{font-weight:800;font-size:18px}
.nav{display:flex;align-items:center;gap:24px}
.nav-links{display:flex;gap:24px}
.nav-link{color:var(--muted);font-size:14px;cursor:pointer;transition:color .2s;background:none;border:none}
.nav-link:hover,.nav-link.active{color:#fff}
.nav-link.active{color:var(--primary-light);font-weight:600}
.nav-btns{display:flex;gap:8px;align-items:center}
.btn-login{background:transparent;border:1px solid rgba(255,255,255,.15);color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;transition:all .2s}
.btn-login:hover{border-color:var(--primary)}
.btn-signup{background:linear-gradient(135deg,var(--primary),var(--purple));border:none;color:#fff;padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;transition:opacity .2s}
.btn-signup:hover{opacity:.9}
.cart-icon{position:relative;cursor:pointer;font-size:18px;padding:4px}
.cart-badge{position:absolute;top:-4px;right:-6px;background:var(--red);border-radius:10px;padding:1px 5px;font-size:9px;display:none}
.hamburger{display:none;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}

/* MOBILE MENU */
#mobileMenu{display:none;position:fixed;inset:0;z-index:9998;background:rgba(15,15,35,.98);flex-direction:column;align-items:center;justify-content:center;gap:28px}
#mobileMenu.open{display:flex}
#mobileMenu .nav-link{font-size:20px;color:#fff}

/* HERO */
.hero{position:relative;overflow:hidden;padding:80px 20px 60px;text-align:center}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(99,102,241,.15) 0%,transparent 60%)}
.hero-content{position:relative;z-index:1;max-width:700px;margin:0 auto}
.hero-sub{color:var(--primary-light);font-size:13px;font-weight:600;letter-spacing:2px;margin-bottom:12px}
.hero h1{font-size:clamp(28px,5vw,44px);font-weight:900;line-height:1.2;margin-bottom:20px;background:linear-gradient(135deg,#fff 40%,var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:15px;line-height:1.7;margin-bottom:32px}
.hero p b{color:var(--text)}
.hero-tags{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:32px}
.hero-tag{background:rgba(99,102,241,.12);border:1px solid var(--border-primary);padding:6px 16px;border-radius:20px;font-size:13px;color:var(--lavender)}
.hero-price-box{background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:16px;padding:20px;display:inline-block}
.hero-price-box .discount{color:var(--red);font-size:13px;font-weight:700}
.hero-price-box .orig{color:var(--dark-dim);font-size:14px;text-decoration:line-through}
.hero-price-box .price{color:#fff;font-size:32px;font-weight:900}
.hero-price-box .price span{font-size:14px;font-weight:400;color:var(--muted)}

/* CATEGORIES */
.categories{max-width:1200px;margin:0 auto;padding:0 20px 20px;display:flex;gap:8px;overflow-x:auto}
.categories::-webkit-scrollbar{display:none}
.cat-btn{white-space:nowrap;padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.cat-btn.active{border-color:var(--primary);background:rgba(99,102,241,.15);color:var(--primary-light)}

/* PRODUCT GRID */
.products{max-width:1200px;margin:0 auto;padding:0 20px 40px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.product-card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--border);display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative}
.product-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(99,102,241,.15)}
.card-badges{position:absolute;top:12px;left:12px;display:flex;gap:6px;z-index:2}
.badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;color:#fff}
.badge-sale{background:var(--red)}
.badge-best{background:var(--primary)}
.badge-soldout{background:#666}
.badge-special{background:#f59e0b}
.card-header{padding:28px 20px 16px;display:flex;align-items:center;gap:12px}
.card-header img{width:40px;height:40px;border-radius:10px;object-fit:cover;background:#fff}
.card-brand{color:var(--muted);font-size:12px}
.card-name{color:#fff;font-size:16px;font-weight:700;margin-top:2px}
.card-desc{padding:0 20px;color:var(--dim);font-size:13px}
.card-divider{margin:12px 20px;height:1px;background:var(--border)}
.card-pricing{padding:0 20px}
.card-price{color:#fff;font-size:24px;font-weight:800}
.card-period{color:var(--primary);font-size:13px;font-weight:600;margin-left:8px}
.card-per-month{color:var(--lavender);font-size:12px;margin-top:2px}
.card-orig{color:var(--dark-dim);font-size:13px;text-decoration:line-through;margin-right:6px}
.card-disc{color:var(--red);font-size:13px;font-weight:700}
.card-features{padding:12px 20px 0}
.card-feature{color:var(--muted);font-size:12px;padding:3px 0;display:flex;align-items:center;gap:6px}
.card-feature::before{content:'•';color:var(--primary)}
.card-sold{padding:8px 20px;color:var(--dark-dim);font-size:12px}
.card-sold b{color:#fff}
.card-action{padding:0 20px 20px;margin-top:auto}
.btn-buy{width:100%;padding:12px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;font-weight:700;font-size:14px;transition:opacity .2s}
.btn-buy:hover{opacity:.9}
.btn-buy.soldout{background:#333;cursor:not-allowed;opacity:.5}
.soldout-label{text-align:center;color:var(--red);font-size:11px;margin-top:6px}
.view-all{text-align:center;margin-top:24px}
.view-all button{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--muted);padding:10px 28px;border-radius:10px;font-size:13px;cursor:pointer;transition:all .2s}
.view-all button:hover{border-color:var(--primary);color:#fff}

/* CHARITY */
.charity{max-width:900px;margin:0 auto;padding:20px 20px 40px}
.charity-box{background:linear-gradient(135deg,#1a2e1a,#1a1a2e);border-radius:20px;padding:32px;border:1px solid rgba(74,222,128,.15);text-align:center}
.charity-box h3{font-size:20px;font-weight:800;margin-bottom:12px}
.charity-box h3 span{color:var(--green)}
.charity-box p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:16px}
.charity-badge{display:inline-block;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);padding:6px 16px;border-radius:20px;color:var(--green);font-size:12px;font-weight:600}

/* LIVE BANNER */
.live-banner{max-width:900px;margin:0 auto;padding:0 20px 40px}
.live-inner{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:16px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border:1px solid rgba(99,102,241,.3)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;display:inline-block;margin-right:8px}
.live-count{color:var(--yellow);font-size:13px;font-weight:600}
.live-title{color:#fff;font-weight:700;font-size:16px;margin-top:4px}
.live-sub{color:var(--lavender);font-size:12px;margin-top:2px}
.live-btn{background:#fff;color:#1e1b4b;border:none;padding:10px 24px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:transform .1s}
.live-btn:hover{transform:scale(1.03)}

/* WHY SECTION */
.why{max-width:900px;margin:0 auto;padding:0 20px 60px;text-align:center}
.why h2{font-size:28px;font-weight:800;margin-bottom:40px}
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.why-card{background:var(--card);border-radius:16px;padding:28px;border:1px solid var(--border)}
.why-icon{font-size:36px;margin-bottom:12px}
.why-title{font-weight:700;font-size:16px;margin-bottom:4px}
.why-desc{color:var(--muted);font-size:13px}
.why-note{margin-top:32px;padding:24px 20px;background:rgba(99,102,241,.05);border-radius:16px;border:1px solid rgba(99,102,241,.1)}
.why-note p{color:var(--text);font-size:15px;line-height:1.7}
.why-note small{color:var(--primary-light);font-size:12px;display:block;margin-top:12px}

/* CHAT SECTION */
.chat-section{max-width:900px;margin:0 auto;padding:0 20px 60px}
.chat-header-text{text-align:center;margin-bottom:32px}
.chat-header-text h2{font-size:28px;font-weight:800;margin-bottom:8px}
.chat-header-text p{color:var(--muted);font-size:14px}
.chat-box{max-width:400px;margin:0 auto;background:var(--card);border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.chat-top{background:var(--primary);padding:12px 16px;display:flex;align-items:center;gap:10px}
.chat-avatar{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:var(--primary)}
.chat-name{color:#fff;font-weight:700;font-size:14px}
.chat-body{padding:16px;max-height:380px;overflow-y:auto}
.chat-msg{display:flex;margin-bottom:12px}
.chat-msg.user{justify-content:flex-end}
.chat-msg.bot{justify-content:flex-start}
.chat-bubble{max-width:80%;padding:10px 14px;font-size:13px;line-height:1.6;color:#fff}
.chat-msg.user .chat-bubble{background:var(--primary);border-radius:16px 16px 4px 16px}
.chat-msg.bot .chat-bubble{background:#252547;border-radius:16px 16px 16px 4px}
.chat-time{color:rgba(255,255,255,.4);font-size:10px;margin-top:4px;text-align:right}
.chat-summary{max-width:500px;margin:24px auto 0;text-align:center}
.chat-summary p{color:var(--text);font-size:14px;line-height:1.8}
.chat-summary .highlight{color:var(--lavender);font-size:14px;margin-top:12px;font-weight:600}

/* REVIEWS */
.reviews{padding:0 0 60px;overflow:hidden}
.reviews-header{text-align:center;margin-bottom:32px;padding:0 20px}
.reviews-header h2{font-size:24px;font-weight:800;margin-bottom:8px}
.reviews-header p{color:var(--muted);font-size:14px}
.review-track{display:flex;gap:16px;animation:scrollReviews 40s linear infinite;width:max-content}
.review-track:hover{animation-play-state:paused}
.review-card{min-width:280px;max-width:280px;background:var(--card);border-radius:16px;padding:20px;border:1px solid var(--border);flex-shrink:0}
.review-stars{color:var(--yellow);font-size:12px;margin-bottom:8px}
.review-title{color:#fff;font-size:15px;font-weight:700;margin-bottom:8px}
.review-text{color:var(--muted);font-size:12px;white-space:pre-line;line-height:1.6;min-height:60px}
.review-user{color:var(--primary);font-size:11px;margin-top:12px}
.reviews-cta{text-align:center;margin-top:32px}
.btn-cta{background:linear-gradient(135deg,var(--primary),var(--purple));border:none;color:#fff;padding:14px 40px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn-cta:hover{opacity:.9}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:32px 20px;text-align:center}
.footer-links{display:flex;justify-content:center;gap:16px;margin-bottom:16px}
.footer-links span{color:var(--dim);font-size:12px;cursor:pointer}
.footer-links span:hover{color:#fff}
.footer-info{color:var(--dark-dim);font-size:11px;line-height:1.8}

/* FLOATING KAKAO */
.kakao-float{position:fixed;bottom:24px;right:24px;z-index:900;width:56px;height:56px;border-radius:50%;background:#fee500;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:float 3s ease-in-out infinite;font-size:28px;border:none}

/* POPUP */
.promo-popup{position:fixed;bottom:24px;left:24px;z-index:950;max-width:320px;animation:slideUp .4s ease}
.promo-inner{background:#1e1b4b;border-radius:16px;padding:16px;border:1px solid rgba(99,102,241,.3);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.promo-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px}
.promo-title{color:#fff;font-weight:700;font-size:14px;margin:4px 0}
.promo-btn{width:100%;margin-top:12px;padding:8px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;font-weight:600;font-size:12px;cursor:pointer}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-box{background:var(--card);border-radius:20px;padding:32px;max-width:420px;width:90%;position:relative;border:1px solid rgba(255,255,255,.1);animation:fadeInUp .3s ease}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.modal-title{font-size:22px;font-weight:800;margin-bottom:24px;text-align:center}
.modal-input{width:100%;padding:12px;border-radius:10px;border:1px solid #333;background:var(--bg);color:#fff;margin-bottom:12px;outline:none;font-size:14px}
.modal-input:focus{border-color:var(--primary)}
.modal-submit{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px}
.modal-link{text-align:center;margin-top:16px;font-size:13px;color:var(--dim)}
.modal-link a{color:var(--primary-light);cursor:pointer}

/* DETAIL MODAL */
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.detail-header img{width:48px;height:48px;border-radius:12px;background:#fff}
.detail-brand{color:var(--lavender);font-size:12px}
.detail-name{color:#fff;font-size:18px;font-weight:700}
.detail-desc{color:var(--muted);font-size:14px;margin-bottom:16px}
.detail-price-box{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:16px}
.detail-price{font-size:26px;font-weight:800}
.detail-feature{color:#cbd5e1;font-size:13px;padding:4px 0}
.btn-cart{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--primary),var(--purple));color:#fff;font-weight:700;font-size:15px;cursor:pointer}
.btn-direct{width:100%;padding:14px;border-radius:12px;border:1px solid var(--primary);background:transparent;color:var(--primary-light);font-weight:700;font-size:15px;cursor:pointer;margin-top:8px}

/* PAGES */
.page{max-width:900px;margin:0 auto;padding:40px 20px}
.page h2{font-size:28px;font-weight:800;margin-bottom:8px}
.page .subtitle{color:var(--muted);margin-bottom:32px}
.notice-item{background:var(--card);border-radius:12px;padding:16px 20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);cursor:pointer;transition:border-color .2s}
.notice-item:hover{border-color:var(--primary)}
.notice-title{color:var(--text);font-size:14px}
.notice-date{color:var(--dim);font-size:12px}
.faq-item{background:var(--card);border-radius:12px;margin-bottom:12px;border:1px solid var(--border);overflow:hidden}
.faq-q{padding:16px 20px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.faq-q span{color:var(--text);font-size:14px;font-weight:600}
.faq-arrow{color:var(--primary);font-size:18px;transition:transform .3s}
.faq-arrow.open{transform:rotate(180deg)}
.faq-a{padding:0 20px 16px;color:var(--muted);font-size:14px;line-height:1.7;display:none}
.faq-a.open{display:block}
.service-card{background:var(--card);border-radius:16px;padding:24px;border:1px solid var(--border);margin-bottom:16px}
.service-icon{font-size:28px;margin-bottom:12px}
.service-title{font-size:18px;font-weight:700;margin-bottom:8px}
.service-desc{color:var(--muted);font-size:14px;line-height:1.7}
.review-page-card{background:var(--card);border-radius:16px;padding:24px;border:1px solid var(--border);margin-bottom:16px}

/* ANIMATIONS */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes scrollReviews{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* RESPONSIVE */
@media(max-width:768px){
  .nav-links{display:none!important}
  .hamburger{display:block!important}
  .hero h1{font-size:28px}
  .product-grid{grid-template-columns:1fr}
  .why-grid{grid-template-columns:1fr}
  .live-inner{flex-direction:column;text-align:center}
}
</style>
</head>
<body>

<!-- HEADER -->
<header id="header">
  <div class="header-inner">
    <div class="logo" onclick="navigate('home')">
      <div class="logo-icon">G</div>
      <span class="logo-text">고튜브</span>
    </div>
    <div class="nav">
      <div class="nav-links" id="navLinks">
        <button class="nav-link" data-page="service" onclick="navigate('service')">서비스</button>
        <button class="nav-link" data-page="buy" onclick="navigate('buy')">구매하기</button>
        <button class="nav-link" data-page="review" onclick="navigate('review')">전체리뷰</button>
        <button class="nav-link" data-page="notice" onclick="navigate('notice')">공지사항</button>
        <button class="nav-link" data-page="faq" onclick="navigate('faq')">FAQ</button>
      </div>
      <div class="nav-btns">
        <span class="cart-icon" onclick="navigate('buy')">🛒<span class="cart-badge" id="cartBadge">0</span></span>
        <button class="btn-login" onclick="openModal('loginModal')">로그인</button>
        <button class="btn-signup" onclick="openModal('signupModal')">회원가입</button>
      </div>
      <button class="hamburger" onclick="toggleMobile()">☰</button>
    </div>
  </div>
</header>

<!-- MOBILE MENU -->
<div id="mobileMenu">
  <button class="nav-link" onclick="navigate('service')">서비스</button>
  <button class="nav-link" onclick="navigate('buy')">구매하기</button>
  <button class="nav-link" onclick="navigate('review')">전체리뷰</button>
  <button class="nav-link" onclick="navigate('notice')">공지사항</button>
  <button class="nav-link" onclick="navigate('faq')">FAQ</button>
  <button class="btn-signup" style="padding:12px 40px;font-size:16px;border-radius:12px" onclick="toggleMobile();openModal('loginModal')">로그인</button>
</div>

<!-- MAIN CONTENT -->
<main id="mainContent" style="padding-top:64px"></main>

<!-- FOOTER -->
<footer>
  <div class="footer-links">
    <span onclick="navigate('home')">이용약관</span>
    <span onclick="navigate('home')">개인정보처리방침</span>

    <div class="why-grid">
      <div class="why-card"><div class="why-icon">🛡️</div><div class="why-title">비밀번호 공유 X</div><div class="why-desc">개인정보 100% 안전</div></div>
      <div class="why-card"><div class="why-icon">⚡</div><div class="why-title">당일 순차 발송</div><div class="why-desc">결제 확인 후 꼼꼼한 처리</div></div>
      <div class="why-card"><div class="why-icon">⭐</div><div class="why-title">4.9점 만족도</div><div class="why-desc">재구매율 1위</div></div>
    </div>
    <div class="why-note">
      <p>간단하게 가입하고, 바로 시작하는 초간편 프로세스<br>복잡한 인증 절차나 불필요한 정보 입력 없이<br><b>1분이면 가입 완료</b>, 기다림 없이 바로 사용할 수 있습니다.</p>
      <small>빠르고 간단한 과정으로 소중한 시간을 아껴드려요.</small>
    </div>
  </section>

  <!-- CHAT -->
  <section class="chat-section">
    <div class="chat-header-text">
      <h2>공유 계정과 다릅니다</h2>
      <p>공유 계정과 어떻게 다른지, 정말 안전한지 지금 확인해 보세요</p>
    </div>
    <div class="chat-box">
      <div class="chat-top">
        <div class="chat-avatar">G</div>
        <div class="chat-name">고튜브 상담</div>
      </div>
      <div class="chat-body">
        ${CHAT.map((m,i)=>`<div class="chat-msg ${m.from}" style="animation:fadeInUp .4s ease ${i*.15}s both">
          <div class="chat-bubble">${esc(m.text)}<div class="chat-time">${m.time}</div></div>
        </div>`).join('')}
      </div>
    </div>
    <div class="chat-summary">
      <p>쓰시던 구글 계정 그대로, <b>비밀번호 공유 없이 안전하게!</b><br>VPN 설정 필요 없이 <b>보내드리는 링크 클릭 한 번</b>에 끝납니다.</p>
      <p class="highlight">단 한 번 결제로 1년 내내 마음 편히, 12개월 66,000원</p>
    </div>
  </section>

  <!-- REVIEWS -->
  <section class="reviews">
    <div class="reviews-header">
      <h2>고객님들의 생생한 찐 후기</h2>
      <p>평점 4.9점! 재구매율 98%가 증명합니다.</p>
    </div>
    <div style="overflow:hidden">
      <div class="review-track">${[...REVIEWS,...REVIEWS].map(r=>reviewCardHTML(r)).join('')}</div>
    </div>
    <div class="reviews-cta"><button class="btn-cta" onclick="navigate('buy')">구매하러 가기</button></div>
  </section>`;
}

function buyPageHTML(){
  return `<div class="page">
    <h2>구매하기</h2><p class="subtitle">원하는 상품을 선택하세요</p>
    <div class="product-grid">${PRODUCTS.map(p=>productCardHTML(p)).join('')}</div>
  </div>`;
}

function reviewPageHTML(){
  return `<div class="page">
    <h2>전체 리뷰</h2><p class="subtitle">평점 4.9점 · 재구매율 98%</p>
    ${REVIEWS.map(r=>`<div class="review-page-card">
      <div style="color:#fbbf24;margin-bottom:8px">⭐⭐⭐⭐⭐</div>
      <div style="font-size:16px;font-weight:700;margin-bottom:8px">${r.title}</div>
      <div style="color:var(--muted);font-size:14px;white-space:pre-line;line-height:1.6">${r.text}</div>
      <div style="color:var(--primary);font-size:12px;margin-top:12px">${r.user} (${r.tag})</div>
    </div>`).join('')}
  </div>`;
}

function noticePageHTML(){
  return `<div class="page">
    <h2>공지사항</h2><div style="margin-bottom:32px"></div>
    ${NOTICES.map(n=>`<div class="notice-item"><span class="notice-title">${n.title}</span><span class="notice-date">${n.date}</span></div>`).join('')}
  </div>`;
}

function faqPageHTML(){
  return `<div class="page">
    <h2>자주 묻는 질문</h2><div style="margin-bottom:32px"></div>
    ${FAQS.map((f,i)=>`<div class="faq-item">
      <div class="faq-q" onclick="toggleFaq(${i})"><span>Q. ${f.q}</span><span class="faq-arrow" id="faqArrow${i}">▾</span></div>
      <div class="faq-a" id="faqA${i}">A. ${f.a}</div>
    </div>`).join('')}
  </div>`;
}

function servicePageHTML(){
  const items=[
    {icon:"🛡️",title:"비밀번호 공유 없는 안전한 방식",desc:"공식 활성화 링크를 통해 고객님의 계정에 직접 적용됩니다. 비밀번호를 공유하지 않아 개인정보가 100% 안전합니다."},
    {icon:"⚡",title:"당일 순차 발송",desc:"결제 확인 후 순차적으로 빠르게 처리해드립니다. 활성화 링크를 카카오톡으로 보내드리며, 클릭 한 번으로 적용됩니다."},
    {icon:"💰",title:"압도적 가성비",desc:"공식 가격 대비 최대 70% 이상 할인된 가격으로 제공합니다. 한 번 결제로 기간 내내 추가 요금 없이 이용 가능합니다."},
    {icon:"🔧",title:"철저한 A/S",desc:"이용 중 문제가 발생하면 카카오톡 상담을 통해 빠르게 해결해드립니다."}
  ];
  return `<div class="page">
    <h2>서비스 안내</h2><p class="subtitle">고튜브가 제공하는 프리미엄 구독 대행 서비스</p>
    ${items.map(s=>`<div class="service-card"><div class="service-icon">${s.icon}</div><div class="service-title">${s.title}</div><div class="service-desc">${s.desc}</div></div>`).join('')}
  </div>`;
}

function toggleFaq(i){
  const a=document.getElementById('faqA'+i);
  const arrow=document.getElementById('faqArrow'+i);
  const isOpen=a.classList.contains('open');
  document.querySelectorAll('.faq-a').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.faq-arrow').forEach(el=>el.classList.remove('open'));
  if(!isOpen){a.classList.add('open');arrow.classList.add('open')}
}

// RENDER
function render(){
  const main=document.getElementById('mainContent');
  switch(currentPage){
    case 'buy':main.innerHTML=buyPageHTML();break;
    case 'review':main.innerHTML=reviewPageHTML();break;
    case 'notice':main.innerHTML=noticePageHTML();break;
    case 'faq':main.innerHTML=faqPageHTML();break;
    case 'service':main.innerHTML=servicePageHTML();break;
    default:main.innerHTML=homeHTML();
  }
}

// SCROLL HANDLER
window.addEventListener('scroll',()=>{
  document.getElementById('header').classList.toggle('scrolled',window.scrollY>60);
});

// LIVE COUNT
setInterval(()=>{
  liveCount+=Math.floor(Math.random()*3)-1;
  if(liveCount<20)liveCount=20;
  const el=document.getElementById('liveNum');
  if(el)el.textContent=liveCount;
},5000);

// PROMO POPUP
setTimeout(()=>{document.getElementById('promoPopup').style.display='block'},3000);

// MODAL OVERLAY CLICK
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')});
});

// HASH ROUTING
function handleHash(){
  const h=location.hash.replace('#','').replace('/','');
  if(h&&['service','buy','review','notice','faq'].includes(h)){navigate(h)}
  else{navigate('home')}
}
window.addEventListener('hashchange',handleHash);

// INIT
render();
</script>
</body>
</html>
